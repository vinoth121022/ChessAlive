version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chesspass
      POSTGRES_DB: chessalive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://chess:chesspass@postgres:5432/chessalive
      JWT_SECRET: supersecretjwtkey
      PORT: 4000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  postgres_data:
